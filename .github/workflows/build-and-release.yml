name: Build and release

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']
    types: [synchronize, opened, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    runs-on: macos-26
    if: github.event.pull_request.draft == false
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
      SCHEME: LunarBarMac
      APP_NAME: LunarBar

    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme LunarBarKitTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          xcodebuild test \
            -scheme LunarBarMacTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package app
        run: |
          APP_PATH=$(find build -path "*/Release/${APP_NAME}.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Cannot find ${APP_NAME}.app in build output"
            find build -name "*.app" -type d
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # Create a staging directory and rename to Dev variant
          DEV_APP_NAME="${APP_NAME} Dev"
          STAGING_DIR="staging"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/${DEV_APP_NAME}.app"

          # Create a ZIP archive
          ARCHIVE_NAME="${APP_NAME}-dev-$(git rev-parse --short HEAD).zip"
          cd "$STAGING_DIR"
          zip -r -y "../$ARCHIVE_NAME" "${DEV_APP_NAME}.app"
          cd ..

          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"
          echo "ARCHIVE_PATH=$(pwd)/$ARCHIVE_NAME" >> "$GITHUB_ENV"

          echo "✅ Packaged: $ARCHIVE_NAME"
          ls -lh "$ARCHIVE_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 30

      # Only create a release when a version tag is pushed
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
